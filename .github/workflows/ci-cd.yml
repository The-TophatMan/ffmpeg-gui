name: FFmpeg GUI CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: src
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libegl1 libxkbcommon-x11-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-cov hypothesis flake8 mypy autopep8 pdoc PySide6
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          if [ -f ci-cd-requirements.txt ]; then python -m pip install -r ci-cd-requirements.txt; fi

      - name: Check style with flake8
        run: |
          flake8 src tests

      - name: Check types with mypy
        run: |
          mypy --disallow-untyped-defs --strict --allow-untyped-decorators --ignore-missing-imports src tests

      - name: Run tests with coverage
        run: |
          pytest -v --color=yes --cov=src --cov-report=term-missing --cov-report=html:docs/htmlcov tests/

      - name: Build documentation
        run: |
          mkdir -p docs
          pdoc --output-dir docs/docs src/